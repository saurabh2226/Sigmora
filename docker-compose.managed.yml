services:
  redis:
    image: redis:7-alpine
    container_name: sigmora-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE in .env.docker}
    container_name: sigmora-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_HOST_PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      TRUST_PROXY: ${TRUST_PROXY:-true}
      CLIENT_URL: ${CLIENT_URL:?Set CLIENT_URL in .env.docker}
      CLIENT_URLS: ${CLIENT_URLS:-}
      ALLOW_VERCEL_PREVIEWS: ${ALLOW_VERCEL_PREVIEWS:-false}
      ALLOW_LOCALHOST_ORIGINS: ${ALLOW_LOCALHOST_ORIGINS:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-none}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      MONGODB_URI: ${MONGODB_URI:?Set MONGODB_URI in .env.docker}
      MYSQL_URI: ${MYSQL_URI:-}
      MYSQL_HOST: ${MYSQL_HOST:-}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-Sigmora_db}
      MYSQL_SSL: ${MYSQL_SSL:-false}
      MYSQL_SSL_REJECT_UNAUTHORIZED: ${MYSQL_SSL_REJECT_UNAUTHORIZED:-false}
      MYSQL_SSL_CA: ${MYSQL_SSL_CA:-}
      MYSQL_SSL_CA_BASE64: ${MYSQL_SSL_CA_BASE64:-}
      MYSQL_SSL_CA_PATH: ${MYSQL_SSL_CA_PATH:-}
      SQL_SCHEMA_SYNC: ${SQL_SCHEMA_SYNC:-true}
      SQL_SCHEMA_ALTER: ${SQL_SCHEMA_ALTER:-false}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET in .env.docker}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env.docker}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_LOCK_TTL_MS: ${REDIS_LOCK_TTL_MS:-15000}
      REDIS_LOCK_WAIT_MS: ${REDIS_LOCK_WAIT_MS:-5000}
      REDIS_LOCK_RETRY_MS: ${REDIS_LOCK_RETRY_MS:-120}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-demo}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-demo}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-demo}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_demo}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-demo}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-demo}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_REQUIRE_TLS: ${EMAIL_REQUIRE_TLS:-false}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@sigmora.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      BOOKING_HOLD_MINUTES: ${BOOKING_HOLD_MINUTES:-10}
      SEED_PENDING_HOLD_DAYS: ${SEED_PENDING_HOLD_DAYS:-120}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: ${FRONTEND_IMAGE:?Set FRONTEND_IMAGE in .env.docker}
    container_name: sigmora-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL in .env.docker}
      VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID:-rzp_test_demo}
      VITE_GOOGLE_MAPS_KEY: ${VITE_GOOGLE_MAPS_KEY:-demo}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  seed:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE in .env.docker}
    profiles: ["demo-data"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      TRUST_PROXY: ${TRUST_PROXY:-true}
      CLIENT_URL: ${CLIENT_URL:?Set CLIENT_URL in .env.docker}
      CLIENT_URLS: ${CLIENT_URLS:-}
      ALLOW_VERCEL_PREVIEWS: ${ALLOW_VERCEL_PREVIEWS:-false}
      ALLOW_LOCALHOST_ORIGINS: ${ALLOW_LOCALHOST_ORIGINS:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-none}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      MONGODB_URI: ${MONGODB_URI:?Set MONGODB_URI in .env.docker}
      MYSQL_URI: ${MYSQL_URI:-}
      MYSQL_HOST: ${MYSQL_HOST:-}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-Sigmora_db}
      MYSQL_SSL: ${MYSQL_SSL:-false}
      MYSQL_SSL_REJECT_UNAUTHORIZED: ${MYSQL_SSL_REJECT_UNAUTHORIZED:-false}
      MYSQL_SSL_CA: ${MYSQL_SSL_CA:-}
      MYSQL_SSL_CA_BASE64: ${MYSQL_SSL_CA_BASE64:-}
      MYSQL_SSL_CA_PATH: ${MYSQL_SSL_CA_PATH:-}
      SQL_SCHEMA_SYNC: ${SQL_SCHEMA_SYNC:-true}
      SQL_SCHEMA_ALTER: ${SQL_SCHEMA_ALTER:-false}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET in .env.docker}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env.docker}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_LOCK_TTL_MS: ${REDIS_LOCK_TTL_MS:-15000}
      REDIS_LOCK_WAIT_MS: ${REDIS_LOCK_WAIT_MS:-5000}
      REDIS_LOCK_RETRY_MS: ${REDIS_LOCK_RETRY_MS:-120}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-demo}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-demo}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-demo}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_demo}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-demo}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-demo}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_REQUIRE_TLS: ${EMAIL_REQUIRE_TLS:-false}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@sigmora.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      BOOKING_HOLD_MINUTES: ${BOOKING_HOLD_MINUTES:-10}
      SEED_PENDING_HOLD_DAYS: ${SEED_PENDING_HOLD_DAYS:-120}
    depends_on:
      redis:
        condition: service_healthy
    command: ["npm", "run", "seed:all"]

volumes:
  redis-data:
